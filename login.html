<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2T89W78LJ3"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-2T89W78LJ3');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | KASU Past Questions Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdf9',
                            100: '#ccfbef',
                            200: '#99f6de',
                            300: '#5eeacb',
                            400: '#2dd4b3',
                            500: '#0d9488',
                            600: '#0f766e',
                            700: '#115e59',
                            800: '#134e4a',
                            900: '#0f3d3a',
                            950: '#042f2c',
                        },
                        accent: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                        },
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-up': 'slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'float': 'float 7s ease-in-out infinite',
                        'shimmer': 'shimmer 3s ease-in-out infinite',
                        'blob': 'blob 20s ease-in-out infinite',
                        'pulse-dot': 'pulseDot 2s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(24px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
                            '33%': { transform: 'translateY(-10px) rotate(1deg)' },
                            '66%': { transform: 'translateY(5px) rotate(-0.5deg)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        },
                        blob: {
                            '0%, 100%': { transform: 'translate(0, 0) scale(1)' },
                            '25%': { transform: 'translate(30px, -40px) scale(1.08)' },
                            '50%': { transform: 'translate(-20px, -20px) scale(0.94)' },
                            '75%': { transform: 'translate(-30px, 30px) scale(1.05)' },
                        },
                        pulseDot: {
                            '0%, 100%': { opacity: '0.4', transform: 'scale(0.8)' },
                            '50%': { opacity: '1', transform: 'scale(1.2)' },
                        },
                    },
                    backgroundSize: {
                        'shimmer': '200% 100%',
                    },
                },
            },
        }
    </script>
    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f8faf9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient blobs */
        .bg-ambiance {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-ambiance .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.16;
            animation: blob 20s ease-in-out infinite;
        }
        .bg-ambiance .blob-1 {
            width: 480px;
            height: 480px;
            background: #0d9488;
            top: -12%;
            right: -8%;
            animation-delay: 0s;
        }
        .bg-ambiance .blob-2 {
            width: 400px;
            height: 400px;
            background: #f59e0b;
            bottom: -10%;
            left: -6%;
            animation-delay: -8s;
        }
        .bg-ambiance .blob-3 {
            width: 300px;
            height: 300px;
            background: #a7f3d0;
            top: 50%;
            left: 55%;
            animation-delay: -14s;
            opacity: 0.1;
        }

        /* Main card */
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 1.75rem;
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.02),
                0 10px 15px -3px rgba(0, 0, 0, 0.04),
                0 20px 40px -8px rgba(15, 62, 58, 0.08),
                0 40px 80px -16px rgba(15, 62, 58, 0.06),
                0 0 0 1px rgba(15, 62, 58, 0.04);
            padding: 2.75rem 2.5rem;
            width: 100%;
            max-width: 460px;
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: box-shadow 0.4s ease;
        }
        .login-card:hover {
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.03),
                0 12px 20px -4px rgba(0, 0, 0, 0.06),
                0 24px 48px -10px rgba(15, 62, 58, 0.12),
                0 48px 96px -20px rgba(15, 62, 58, 0.08),
                0 0 0 1px rgba(15, 62, 58, 0.06);
        }

        /* Top accent bar */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            border-radius: 1.75rem 1.75rem 0 0;
            background: linear-gradient(105deg,
                    #0d9488 0%,
                    #14b8a6 20%,
                    #f59e0b 50%,
                    #fbbf24 70%,
                    #0d9488 100%);
            background-size: shimmer 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }

        /* Logo */
        .logo-shield {
            width: 76px;
            height: 76px;
            border-radius: 20px;
            background: linear-gradient(145deg, #ffffff 0%, #f0fdf9 100%);
            margin: 0 auto 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 8px 24px -6px rgba(13, 148, 136, 0.3),
                0 2px 6px -1px rgba(13, 148, 136, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            animation: float 7s ease-in-out infinite;
            position: relative;
        }
        .logo-shield::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 23px;
            padding: 2px;
            background: linear-gradient(135deg, #0d9488, #f59e0b, #0d9488);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.45;
        }
        .logo-shield img {
            width: 62%;
            height: 62%;
            object-fit: contain;
            border-radius: 12px;
        }

        /* Input styling */
        .input-group {
            position: relative;
        }
        .input-group .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.95rem;
            pointer-events: none;
            transition: color 0.25s ease;
            z-index: 2;
        }
        .input-field {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.7rem;
            border-radius: 0.85rem;
            border: 1.5px solid #e8ecef;
            background-color: #fafcfc;
            font-size: 0.925rem;
            font-family: 'Inter', system-ui, sans-serif;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            color: #1a2e2c;
            letter-spacing: 0.01em;
            position: relative;
            z-index: 1;
        }
        .input-field::placeholder {
            color: #b0bdb9;
            font-weight: 400;
        }
        .input-field:focus {
            outline: none;
            border-color: #0d9488;
            background-color: #ffffff;
            box-shadow:
                0 0 0 5px rgba(13, 148, 136, 0.07),
                0 4px 16px -6px rgba(13, 148, 136, 0.15);
        }
        .input-field:focus~.input-icon,
        .input-group:focus-within .input-icon {
            color: #0d9488;
        }
        .input-field.input-error {
            border-color: #ef4444;
            background-color: #fff5f5;
            box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.05);
        }

        /* Password wrapper */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .input-field {
            padding-right: 3rem;
        }
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            z-index: 3;
            font-size: 1rem;
            transition: color 0.25s ease;
            background: none;
            border: none;
            padding: 0.3rem;
        }
        .toggle-password:hover {
            color: #0d9488;
        }

        /* Field label */
        .field-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #5c726e;
            margin-bottom: 0.45rem;
            transition: color 0.25s ease;
        }

        /* Login method tabs */
        .method-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
            background: #f1f5f4;
            border-radius: 0.75rem;
            padding: 0.3rem;
        }
        .method-tab {
            flex: 1;
            text-align: center;
            padding: 0.6rem 0.5rem;
            border-radius: 0.6rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #6b7f7a;
            letter-spacing: 0.02em;
            border: none;
            background: transparent;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .method-tab.active {
            background: #ffffff;
            color: #0d9488;
            box-shadow: 0 2px 8px -2px rgba(13, 148, 136, 0.2);
        }
        .method-tab:hover:not(.active) {
            color: #115e59;
            background: rgba(255, 255, 255, 0.6);
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 0.85rem;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 40%, #115e59 100%);
            color: #ffffff;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            border: none;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 20px -6px rgba(13, 148, 136, 0.4);
        }
        .submit-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.12) 40%,
                    rgba(255, 255, 255, 0) 60%);
            background-size: shimmer 200% 100%;
            animation: shimmer 2.5s ease-in-out infinite;
            pointer-events: none;
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 32px -8px rgba(13, 148, 136, 0.5);
            background: linear-gradient(135deg, #14b8a6 0%, #0d9488 40%, #0f766e 100%);
        }
        .submit-btn:active {
            transform: translateY(-1px) scale(0.985);
            box-shadow: 0 6px 16px -4px rgba(13, 148, 136, 0.4);
            transition: all 0.1s ease;
        }
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Custom checkbox */
        .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            user-select: none;
            padding: 0.2rem 0;
        }
        .checkbox-custom {
            width: 1.1rem;
            height: 1.1rem;
            border: 2px solid #cbd5d1;
            border-radius: 0.35rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            background: #fafcfc;
        }
        .checkbox-custom.checked {
            background-color: #0d9488;
            border-color: #0d9488;
            box-shadow: 0 0 0 5px rgba(13, 148, 136, 0.08);
        }
        .checkbox-custom i {
            color: #ffffff;
            font-size: 0.6rem;
            display: none;
        }
        .checkbox-custom.checked i {
            display: block;
        }
        .checkbox-label {
            font-size: 0.8rem;
            color: #5c726e;
            cursor: pointer;
            font-weight: 500;
        }

        /* Error toast */
        .error-toast {
            margin-top: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 0.75rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            letter-spacing: 0.01em;
        }
        .error-toast i {
            margin-right: 0.4rem;
        }

        /* Success toast */
        .success-toast {
            margin-top: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 0.75rem;
            background: #f0fdf9;
            border: 1px solid #a7f3d0;
            color: #0f766e;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            letter-spacing: 0.01em;
        }

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 1.75rem;
            z-index: 20;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .spinner-ring {
            width: 3rem;
            height: 3rem;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #0d9488;
            border-right: 3px solid #f59e0b;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Divider */
        .divider-text {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0.2rem 0;
        }
        .divider-text span {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
            font-weight: 600;
            white-space: nowrap;
        }
        .divider-text::before,
        .divider-text::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8ecef;
            border-radius: 1px;
        }

        /* Note card */
        .note-card {
            background: #f0fdf9;
            border-left: 4px solid #0d9488;
            border-radius: 0.75rem;
            padding: 0.8rem 1rem;
            margin-top: 1.25rem;
        }
        .note-card p {
            font-size: 0.73rem;
            color: #115e59;
            line-height: 1.5;
            font-weight: 500;
        }
        .note-card strong {
            color: #0f766e;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 1.4rem;
            }
            .login-card::before {
                border-radius: 1.4rem 1.4rem 0 0;
                height: 4px;
            }
            .logo-shield {
                width: 62px;
                height: 62px;
                border-radius: 16px;
            }
            .logo-shield::after {
                border-radius: 19px;
            }
            .input-field {
                font-size: 0.875rem;
                padding: 0.8rem 0.85rem 0.8rem 2.5rem;
            }
            .field-label {
                font-size: 0.7rem;
            }
            .submit-btn {
                font-size: 0.95rem;
                padding: 0.9rem;
            }
            h1 {
                font-size: 1.6rem !important;
            }
            .method-tab {
                font-size: 0.72rem;
                padding: 0.5rem 0.4rem;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient background blobs -->
    <div class="bg-ambiance">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Login Card -->
    <div class="login-card" id="loginCard">
        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="spinner-ring"></div>
            <p class="text-lg font-semibold text-gray-700 tracking-tight">Verifying credentials…</p>
            <p class="text-sm text-gray-400 mt-1">Please wait</p>
        </div>

        <!-- Logo -->
        <div class="logo-shield">
            <img src="kasu-badge.jpg" alt="KASU Badge">
            <!-- Fallback removed, image now used -->
        </div>

        <!-- Header -->
        <h1 class="text-3xl font-extrabold text-gray-800 text-center tracking-tight" style="letter-spacing: -0.02em;">
            Welcome Back
        </h1>
        <p class="text-gray-500 text-center mb-1 text-sm font-medium">
            Sign in to KASU Past Questions Hub
        </p>
        <div class="divider-text">
            <span>Secure Login</span>
        </div>

        <!-- Form -->
        <form id="loginForm" class="space-y-3.5 mt-3" novalidate>
            <!-- Login Method Tabs -->
            <div class="method-tabs" id="methodTabs">
                <button type="button" class="method-tab active" data-method="email" id="tabEmail">
                    <i class="fa-regular fa-envelope mr-1"></i> Email
                </button>
                <button type="button" class="method-tab" data-method="matric" id="tabMatric">
                    <i class="fa-regular fa-id-card mr-1"></i> Matric Number
                </button>
            </div>

            <!-- Email Field -->
            <div id="emailField">
                <label class="field-label" for="email">Email Address</label>
                <div class="input-group">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="email"
                    id="email"
                    placeholder="Email Address"
                    class="input-field"
                    autocomplete="email">
                </div>
            </div>

            <!-- Matric Field (hidden by default) -->
            <div id="matricField" style="display: none;">
                <label class="field-label" for="matric">Matric Number</label>
                <div class="input-group">
                    <i class="fa-regular fa-id-card input-icon"></i>
                    <input type="text"
                    id="matric"
                    placeholder="Matric Number"
                    class="input-field"
                    style="text-transform: uppercase; letter-spacing: 0.03em;"
                    autocomplete="username">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="field-label" for="password">Password</label>
                <div class="password-wrapper input-group">
                    <i class="fa-regular fa-lock input-icon"></i>
                    <input type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    placeholder="••••••••"
                    class="input-field"
                    required
                    minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePass('password', this)" aria-label="Toggle password visibility">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="flex items-center justify-between">
                <div class="checkbox-wrap" id="rememberWrap" onclick="toggleRemember()">
                    <div id="rememberCheckbox" class="checkbox-custom">
                        <i class="fas fa-check"></i>
                    </div>
                    <input type="checkbox" id="rememberInput" class="hidden">
                    <label class="checkbox-label" for="rememberInput">Remember me</label>
                </div>
                <a href="#"
                class="text-xs font-semibold text-brand-600 hover:text-brand-700 hover:underline transition-colors duration-200">
                    Forgot password?
                </a>
            </div>

            <!-- Error Toast -->
            <div id="loginError" class="error-toast">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="loginErrorText"></span>
            </div>

            <!-- Success Toast -->
            <div id="loginSuccess" class="success-toast">
                <i class="fa-solid fa-circle-check"></i>
                <span>Login successful! Redirecting…</span>
            </div>

            <!-- Submit -->
            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
                <span>Sign In</span>
            </button>
        </form>

        <!-- Note -->
        <div class="note-card">
            <p>
                <strong>🔐 Secure Access:</strong> Your credentials are verified locally.
                No data is transmitted over the internet.
            </p>
        </div>

        <!-- Register link -->
        <p class="text-center mt-5 text-sm text-gray-500 font-medium">
            Don't have an account?
            <a href="register.html"
            class="text-brand-600 font-semibold hover:text-brand-700 hover:underline transition-colors duration-200">
                Create one
            </a>
        </p>
    </div>

    <script>
        // ---- State ----
        let loginMethod = 'email'; // 'email' or 'matric'

        // ---- DOM refs ----
        const emailField = document.getElementById('emailField');
        const matricField = document.getElementById('matricField');
        const emailInput = document.getElementById('email');
        const matricInput = document.getElementById('matric');
        const passwordInput = document.getElementById('password');
        const tabEmail = document.getElementById('tabEmail');
        const tabMatric = document.getElementById('tabMatric');
        const loginError = document.getElementById('loginError');
        const loginErrorText = document.getElementById('loginErrorText');
        const loginSuccess = document.getElementById('loginSuccess');
        const submitBtn = document.getElementById('submitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const rememberCheckbox = document.getElementById('rememberCheckbox');
        const rememberInput = document.getElementById('rememberInput');

        // ---- Toggle password visibility ----
        function togglePass(inputId, btnEl) {
            const input = document.getElementById(inputId);
            const icon = btnEl.querySelector('i');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            icon.classList.toggle('fa-eye', isPassword);
            icon.classList.toggle('fa-eye-slash', !isPassword);
        }

        // ---- Toggle remember me ----
        function toggleRemember() {
            rememberInput.checked = !rememberInput.checked;
            rememberCheckbox.classList.toggle('checked', rememberInput.checked);
        }
        document.querySelector('#rememberWrap .checkbox-label')?.addEventListener('click', function(e) {
            toggleRemember();
        });

        // ---- Switch login method ----
        function switchMethod(method) {
            loginMethod = method;
            if (method === 'email') {
                emailField.style.display = 'block';
                matricField.style.display = 'none';
                matricInput.value = '';
                matricInput.classList.remove('input-error');
                emailInput.setAttribute('required', '');
                matricInput.removeAttribute('required');
                tabEmail.classList.add('active');
                tabMatric.classList.remove('active');
                emailInput.focus();
            } else {
                emailField.style.display = 'none';
                matricField.style.display = 'block';
                emailInput.value = '';
                emailInput.classList.remove('input-error');
                matricInput.setAttribute('required', '');
                emailInput.removeAttribute('required');
                tabMatric.classList.add('active');
                tabEmail.classList.remove('active');
                matricInput.focus();
            }
            hideError();
            hideSuccess();
        }

        tabEmail.addEventListener('click', () => switchMethod('email'));
        tabMatric.addEventListener('click', () => switchMethod('matric'));

        // ---- Error / Success helpers ----
        function showError(message) {
            loginErrorText.textContent = message;
            loginError.style.display = 'block';
            loginError.style.animation = 'none';
            loginError.offsetHeight;
            loginError.style.animation = 'slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards';
            hideSuccess();
        }

        function hideError() {
            loginError.style.display = 'none';
        }

        function showSuccess(message) {
            loginSuccess.querySelector('span').textContent = message || 'Login successful! Redirecting…';
            loginSuccess.style.display = 'block';
            loginSuccess.style.animation = 'none';
            loginSuccess.offsetHeight;
            loginSuccess.style.animation = 'slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards';
            hideError();
        }

        function hideSuccess() {
            loginSuccess.style.display = 'none';
        }

        function markInputError(inputEl) {
            if (inputEl) {
                inputEl.classList.add('input-error');
                inputEl.addEventListener('input', function removeError() {
                    inputEl.classList.remove('input-error');
                    inputEl.removeEventListener('input', removeError);
                }, { once: true });
            }
        }

        // ---- Matric validation (same as registration) ----
        function parseKasuMatric(matric) {
            const trimmed = matric.trim().toUpperCase();
            const parts = trimmed.split('/');
            if (parts.length !== 4) return null;
            if (parts[0] !== 'KASU') return null;
            const dept = parts[2].toLowerCase();
            const yearStr = parts[1];
            const studentNum = parts[3];
            if (!/^\d{2}$/.test(yearStr)) return null;
            if (!/^\d+$/.test(studentNum)) return null;
            if (!/^[a-zA-Z]+$/.test(parts[2])) return null;
            const yearCode = parseInt(yearStr);
            let level = (2026 - (2000 + yearCode)) * 100;
            if (level < 100) level = 100;
            if (level > 600) level = 600;
            return { dept, level, studentNum, formatted: trimmed };
        }

        // ---- Live matric feedback ----
        matricInput.addEventListener('input', function() {
            const val = this.value.trim();
            if (val.length === 0) {
                this.style.borderColor = '#e8ecef';
                this.style.backgroundColor = '#fafcfc';
                this.style.boxShadow = '';
            } else if (parseKasuMatric(val)) {
                this.style.borderColor = '#22c55e';
                this.style.backgroundColor = '#f9fefb';
                this.style.boxShadow = '0 0 0 5px rgba(34,197,94,0.06)';
            } else if (val.length >= 10) {
                this.style.borderColor = '#f59e0b';
                this.style.backgroundColor = '#fffef9';
                this.style.boxShadow = '0 0 0 5px rgba(245,158,11,0.06)';
            } else {
                this.style.borderColor = '#e8ecef';
                this.style.backgroundColor = '#fafcfc';
                this.style.boxShadow = '';
            }
        });

        // ---- Clear errors on input ----
        [emailInput, matricInput, passwordInput].forEach(input => {
            input.addEventListener('focus', function() {
                this.classList.remove('input-error');
                hideError();
                hideSuccess();
            });
        });

        // ---- Check for remembered email/matric ----
        function checkRemembered() {
            const remembered = localStorage.getItem('kasuRememberedLogin');
            if (remembered) {
                try {
                    const data = JSON.parse(remembered);
                    if (data.type === 'email' && data.value) {
                        switchMethod('email');
                        emailInput.value = data.value;
                        rememberInput.checked = true;
                        rememberCheckbox.classList.add('checked');
                    } else if (data.type === 'matric' && data.value) {
                        switchMethod('matric');
                        matricInput.value = data.value;
                        rememberInput.checked = true;
                        rememberCheckbox.classList.add('checked');
                    }
                } catch (e) {
                    // ignore corrupted data
                }
            }
        }
        checkRemembered();

        // ---- Form submission ----
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();
            hideSuccess();

            const password = passwordInput.value;
            let identifier = '';
            let identifierType = '';

            if (loginMethod === 'email') {
                identifier = emailInput.value.trim();
                identifierType = 'email';
                if (!identifier || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(identifier)) {
                    showError('Please enter a valid email address.');
                    markInputError(emailInput);
                    return;
                }
            } else {
                identifier = matricInput.value.trim();
                identifierType = 'matric';
                const parsed = parseKasuMatric(identifier);
                if (!parsed) {
                    showError('Invalid matric number format. Use: KASU/YEAR/DEPT/NUMBER');
                    markInputError(matricInput);
                    return;
                }
                identifier = parsed.formatted; // normalize to uppercase
            }

            if (!password || password.length < 6) {
                showError('Please enter your password (min. 6 characters).');
                markInputError(passwordInput);
                return;
            }

            // Retrieve stored user
            const storedUserJSON = localStorage.getItem('kasuUser');
            if (!storedUserJSON) {
                showError('No registered account found. Please create an account first.');
                return;
            }

            let storedUser;
            try {
                storedUser = JSON.parse(storedUserJSON);
            } catch (e) {
                showError('Account data is corrupted. Please register again.');
                return;
            }

            // Verify credentials
            let isMatch = false;

            if (identifierType === 'email') {
                // Case-insensitive email comparison
                if (storedUser.email &&
                    storedUser.email.toLowerCase() === identifier.toLowerCase() &&
                    storedUser.password === password) {
                    isMatch = true;
                }
            } else if (identifierType === 'matric') {
                // Exact matric match
                if (storedUser.matric &&
                    storedUser.matric.toUpperCase() === identifier.toUpperCase() &&
                    storedUser.password === password) {
                    isMatch = true;
                }
            }

            if (!isMatch) {
                showError('Invalid credentials. Please check and try again.');
                markInputError(passwordInput);
                if (loginMethod === 'email') markInputError(emailInput);
                else markInputError(matricInput);
                return;
            }

            // ---- Success ----
            showSuccess('Login successful! Redirecting…');
            submitBtn.disabled = true;
            loadingOverlay.style.display = 'flex';

            // Update last login timestamp
            storedUser.lastLogin = new Date().toISOString();
            localStorage.setItem('kasuUser', JSON.stringify(storedUser));

            // Set session
            sessionStorage.setItem('kasuSession', JSON.stringify({
                email: storedUser.email,
                matric: storedUser.matric,
                name: storedUser.name,
                dept: storedUser.dept,
                level: storedUser.level,
                loggedInAt: new Date().toISOString(),
            }));

            // Handle "Remember me"
            if (rememberInput.checked) {
                localStorage.setItem('kasuRememberedLogin', JSON.stringify({
                    type: identifierType,
                    value: identifier,
                }));
            } else {
                localStorage.removeItem('kasuRememberedLogin');
            }

            // Artificial delay for UX
            await new Promise(resolve => setTimeout(resolve, 1500));

            // Redirect to the home page
            window.location.href = 'home.html';
        });

        // ---- Check if already logged in ----
        (function checkExistingSession() {
            const session = sessionStorage.getItem('kasuSession');
            if (session) {
                try {
                    const sessionData = JSON.parse(session);
                    const user = JSON.parse(localStorage.getItem('kasuUser') || '{}');
                    if (sessionData.email === user.email || sessionData.matric === user.matric) {
                        // Valid session exists — could auto-redirect
                        console.log('%c✅ Active session detected for: ' + (sessionData.name || sessionData.email),
                            'color: #0d9488;');
                        // Uncomment below for auto-redirect:
                        // window.location.href = 'home.html';
                    }
                } catch (e) {
                    sessionStorage.removeItem('kasuSession');
                }
            }
        })();

        // ---- Log ----
        console.log('%c🔐 KASU Login Portal Ready %c| %cEmail or Matric + Password',
            'color: #0d9488; font-weight: bold;', '', 'color: #f59e0b;');
        console.log('%c✨ Designed for Kaduna State University — Past Questions Hub',
            'color: #5c726e; font-style: italic;');
    </script>
</body>
