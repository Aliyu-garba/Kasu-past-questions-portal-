<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com">
    </script>

                            100: '#ccfbef',

                        accent: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                        },
                        surface: '#fafbfc',
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'system-ui', '-apple-system', 'sans-serif'],
                        display: ['"Inter"', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-up': 'slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-soft': 'pulseSoft 3s ease-in-out infinite',

                            '25%': { transform: 'translate(30px, -40px) scale(1.08)' },
                            '50%': { transform: 'translate(-20px, -20px) scale(0.94)' },
                            '75%': { transform: 'translate(-30px, 30px) scale(1.05)' },
                        },
                    },
                    backgroundSize: {
                        'shimmer': '200% 100%',
                    },
                },
            },
        }
    </script>
    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f8faf9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle animated background blobs */
        .bg-ambiance {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-ambiance .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.18;
            animation: blob 20s ease-in-out infinite;
        }
        .bg-ambiance .blob-1 {
            width: 500px;
            height: 500px;
            background: #0d9488;
            top: -15%;
            left: -10%;
            animation-delay: 0s;
        }
        .bg-ambiance .blob-2 {
            width: 420px;
            height: 420px;
            background: #f59e0b;
            bottom: -12%;
            right: -8%;
            animation-delay: -7s;
        }
        .bg-ambiance .blob-3 {
            width: 350px;
            height: 350px;
            background: #a7f3d0;
            top: 55%;
            left: 50%;
            animation-delay: -14s;
            opacity: 0.12;
        }

        /* Main card */
        .register-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 1.75rem;
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.02),
                0 10px 15px -3px rgba(0, 0, 0, 0.04),
                0 20px 40px -8px rgba(15, 62, 58, 0.08),
                0 40px 80px -16px rgba(15, 62, 58, 0.06),
                0 0 0 1px rgba(15, 62, 58, 0.04);
            padding: 2.75rem 2.5rem;
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: box-shadow 0.4s ease;
        }
        .register-card:hover {
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.03),
                0 12px 20px -4px rgba(0, 0, 0, 0.06),
                0 24px 48px -10px rgba(15, 62, 58, 0.12),
                0 48px 96px -20px rgba(15, 62, 58, 0.08),
                0 0 0 1px rgba(15, 62, 58, 0.06);
        }

        /* Top accent bar */
        .register-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            border-radius: 1.75rem 1.75rem 0 0;
            background: linear-gradient(105deg,
                    #0d9488 0%,
                    #14b8a6 20%,
                    #f59e0b 50%,
                    #fbbf24 70%,
                    #0d9488 100%);
            background-size: shimmer 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }

        /* Logo shield */
        .logo-shield {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            background: linear-gradient(145deg, #ffffff 0%, #f0fdf9 100%);
            margin: 0 auto 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 8px 24px -6px rgba(13, 148, 136, 0.3),
                0 2px 6px -1px rgba(13, 148, 136, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            animation: float 7s ease-in-out infinite;
            position: relative;
        }
        .logo-shield::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 25px;
            padding: 2px;
            background: linear-gradient(135deg, #0d9488, #f59e0b, #0d9488);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
        }
        .logo-shield img {
            width: 62%;
            height: 62%;
            object-fit: contain;
            border-radius: 12px;
        }
        .logo-shield .logo-fallback {
            font-size: 2rem;
            font-weight: 800;
            color: #0d9488;
            letter-spacing: -1px;
        }

        /* Input styling */
        .input-group {
            position: relative;
            margin-bottom: 0.25rem;
        }
        .input-group .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.95rem;
            pointer-events: none;
            transition: color 0.25s ease;
            z-index: 2;
        }
        .input-field {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.7rem;
            border-radius: 0.85rem;
            border: 1.5px solid #e8ecef;
            background-color: #fafcfc;
            font-size: 0.925rem;
            font-family: 'Inter', system-ui, sans-serif;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            color: #1a2e2c;
            letter-spacing: 0.01em;
            position: relative;
            z-index: 1;
        }
        .input-field::placeholder {
            color: #b0bdb9;
            font-weight: 400;
        }
        .input-field:focus {
            outline: none;
            border-color: #0d9488;
            background-color: #ffffff;
            box-shadow:
                0 0 0 5px rgba(13, 148, 136, 0.07),
                0 4px 16px -6px rgba(13, 148, 136, 0.15);
        }
        .input-field:focus~.input-icon,
        .input-group:focus-within .input-icon {
            color: #0d9488;
        }
        .input-field.input-error {
            border-color: #ef4444;
            background-color: #fff5f5;
            box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.05);
        }

        /* Password wrapper */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .input-field {
            padding-right: 3rem;
        }
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
            z-index: 3;
            font-size: 1rem;
            transition: color 0.25s ease;
            background: none;
            border: none;
            padding: 0.3rem;
        }
        .toggle-password:hover {
            color: #0d9488;
        }

        /* Label */
        .field-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #5c726e;
            margin-bottom: 0.45rem;
            transition: color 0.25s ease;
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 0.85rem;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 40%, #115e59 100%);
            color: #ffffff;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            border: none;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 20px -6px rgba(13, 148, 136, 0.4);
        }
        .submit-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.12) 40%,
                    rgba(255, 255, 255, 0) 60%);
            background-size: shimmer 200% 100%;
            animation: shimmer 2.5s ease-in-out infinite;
            pointer-events: none;
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 32px -8px rgba(13, 148, 136, 0.5);
            background: linear-gradient(135deg, #14b8a6 0%, #0d9488 40%, #0f766e 100%);
        }
        .submit-btn:active {
            transform: translateY(-1px) scale(0.985);
            box-shadow: 0 6px 16px -4px rgba(13, 148, 136, 0.4);
            transition: all 0.1s ease;
        }
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Custom checkbox */
        .checkbox-wrap {
            display: flex;
            align-items: flex-start;
            gap: 0.7rem;
            cursor: pointer;
            user-select: none;
            padding: 0.3rem 0;
        }
        .checkbox-custom {
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #cbd5d1;
            border-radius: 0.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            background: #fafcfc;
            margin-top: 0.1rem;
        }
        .checkbox-custom.checked {
            background-color: #0d9488;
            border-color: #0d9488;
            box-shadow: 0 0 0 5px rgba(13, 148, 136, 0.1);
        }
        .checkbox-custom i {
            color: #ffffff;
            font-size: 0.65rem;
            display: none;
        }
        .checkbox-custom.checked i {
            display: block;
        }
        .checkbox-label {
            font-size: 0.8rem;
            color: #5c726e;
            line-height: 1.5;
            cursor: pointer;
        }
        .checkbox-label a {
            color: #0d9488;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s ease;
            border-bottom: 1px solid transparent;
        }
        .checkbox-label a:hover {
            color: #0f766e;
            border-bottom-color: #0f766e;
        }

        /* Error message */
        .error-toast {
            margin-top: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 0.75rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            display: none;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            letter-spacing: 0.01em;
        }
        .error-toast i {
            margin-right: 0.4rem;
        }

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 1.75rem;
            z-index: 20;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .spinner-ring {
            width: 3.2rem;
            height: 3.2rem;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #0d9488;
            border-right: 3px solid #f59e0b;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 1.2rem;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Note card */
        .note-card {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            border-radius: 0.75rem;
            padding: 0.85rem 1rem;
            margin-top: 1.25rem;
        }
        .note-card p {
            font-size: 0.75rem;
            color: #92400e;
            line-height: 1.5;
            font-weight: 500;
        }
        .note-card strong {
            color: #b45309;
        }

        /* Divider */
        .divider-text {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0.25rem 0;
        }
        .divider-text span {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
            font-weight: 600;
            white-space: nowrap;
        }
        .divider-text::before,
        .divider-text::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8ecef;
            border-radius: 1px;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .register-card {
                padding: 2rem 1.5rem;
                border-radius: 1.4rem;
            }
            .register-card::before {
                border-radius: 1.4rem 1.4rem 0 0;
                height: 4px;
            }
            .logo-shield {
                width: 66px;
                height: 66px;
                border-radius: 18px;
            }
            .logo-shield::after {
                border-radius: 21px;
            }
            .input-field {
                font-size: 0.875rem;
                padding: 0.8rem 0.85rem 0.8rem 2.5rem;
            }
            .field-label {
                font-size: 0.7rem;
            }
            .submit-btn {
                font-size: 0.95rem;
                padding: 0.9rem;
            }
            h1 {
                font-size: 1.6rem !important;
            }
        }
    </style>
</head>
<body>

    <!-- Ambient background blobs -->
    <div class="bg-ambiance">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Registration Card -->
    <div class="register-card" id="registerCard">
        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="spinner-ring"></div>
            <p class="text-lg font-semibold text-gray-700 tracking-tight">Setting up your account…</p>
            <p class="text-sm text-gray-400 mt-1">Just a moment</p>
        </div>

        <!-- Logo -->
        <div class="logo-shield">           
        <img src="kasu-badge.jpg" alt="KASU Logo">
        </div>

        <!-- Header -->
        <h1 class="text-3xl font-extrabold text-gray-800 text-center tracking-tight" style="letter-spacing: -0.02em;">
            Create Your Account
        </h1>
        <p class="text-gray-500 text-center mb-1 text-sm font-medium">
            Kaduna State University — Past Questions Hub
        </p>
        <div class="divider-text">
            <span>Student Registration</span>
        </div>

        <!-- Form -->
        <form id="registerForm" class="space-y-3.5 mt-2" novalidate>
            <!-- Full Name -->
            <div>
                <label class="field-label" for="fullName">Full Name</label>
                <div class="input-group">
                    <i class="fa-regular fa-user input-icon"></i>
                    <input type="text" id="fullName" placeholder="Full Name" class="input-field" required autocomplete="name">
                </div>
            </div>

            <!-- Email -->
            <div>
                <label class="field-label" for="email">Email Address</label>
                <div class="input-group">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="email" id="email" placeholder="Email Address" class="input-field" required autocomplete="email">
                </div>
            </div>

            <!-- Matric Number -->
            <div>
                <label class="field-label" for="matric">Matric Number</label>
                <div class="input-group">
                    <i class="fa-regular fa-id-card input-icon"></i>
                    <input type="text"
                    id="matric"
                    name="username"
                    autocomplete="username"
                    placeholder="Matric Number"
                    class="input-field"
                    required
                    style="text-transform: uppercase; letter-spacing: 0.03em;">
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="field-label" for="password">Password</label>
                <div class="password-wrapper input-group">
                    <i class="fa-regular fa-lock input-icon"></i>
                    <input type="password"
                    id="password"
                    name="new-password"
                    autocomplete="new-password"
                    placeholder="••••••••"
                    class="input-field"
                    required
                    minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePass('password', this)" aria-label="Toggle password visibility">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="field-label" for="confirmPassword">Confirm Password</label>
                <div class="password-wrapper input-group">
                    <i class="fa-regular fa-lock input-icon"></i>
                    <input type="password"
                    id="confirmPassword"
                    placeholder="••••••••"
                    class="input-field"
                    required
                    minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePass('confirmPassword', this)" aria-label="Toggle password visibility">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Terms -->
            <div class="checkbox-wrap" id="termsWrap" onclick="toggleTerms()">
                <div id="termsCheckbox" class="checkbox-custom">
                    <i class="fas fa-check"></i>
                </div>
                <input type="checkbox" id="termsInput" class="hidden" required>
                <label class="checkbox-label" for="termsInput">
                    I agree to the
                    <a href="terms.html" target="_blank" rel="noopener">Terms of Service</a>
                    and
                    <a href="privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.
                </label>
            </div>

            <!-- Error -->
            <div id="regError" class="error-toast">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="regErrorText"></span>
            </div>

            <!-- Submit -->
            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fa-solid fa-user-plus"></i>
                <span>Create Account</span>
            </button>
        </form>

        <!-- Note -->
        <div class="note-card">
            <p>
                <strong>Note:</strong> Registration data is stored locally on your device.
                Server-side account storage will be available in a future update.
            </p>
        </div>

        <!-- Login link -->
        <p class="text-center mt-5 text-sm text-gray-500 font-medium">
            Already have an account?
            <a href="login.html" class="text-brand-600 font-semibold hover:text-brand-700 hover:underline transition-colors duration-200">
                Sign in
            </a>
        </p>
    </div>

    <script>
        /**
         * Toggle password visibility
         */
        function togglePass(inputId, btnEl) {
            const input = document.getElementById(inputId);
            const icon = btnEl.querySelector('i');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            icon.classList.toggle('fa-eye', isPassword);
            icon.classList.toggle('fa-eye-slash', !isPassword);
        }

        /**
         * Toggle custom terms checkbox
         */
        function toggleTerms() {
            const input = document.getElementById('termsInput');
            const box = document.getElementById('termsCheckbox');
            input.checked = !input.checked;
            box.classList.toggle('checked', input.checked);
        }

        // Allow clicking the label text to also toggle
        document.querySelector('.checkbox-label')?.addEventListener('click', function(e) {
            if (e.target.tagName === 'A') return; // let links work
            toggleTerms();
        });

        /**
         * Parse KASU Matric Number
         * Expected format: KASU/YEAR/DEPT/NUMBER
         * Example: KASU/24/BTE/1104
         * Returns { dept, level } or null
         */
        function parseKasuMatric(matric) {
            const trimmed = matric.trim().toUpperCase();
            const parts = trimmed.split('/');

            // Must have exactly 4 parts: KASU, YEAR, DEPT, NUMBER
            if (parts.length !== 4) return null;
            if (parts[0] !== 'KASU') return null;

            const dept = parts[2].toLowerCase();
            const yearStr = parts[1];
            const studentNum = parts[3];

            // Year must be 2 digits and numeric
            if (!/^\d{2}$/.test(yearStr)) return null;
            // Student number must be numeric
            if (!/^\d+$/.test(studentNum)) return null;
            // Department should be alphabetic
            if (!/^[a-zA-Z]+$/.test(parts[2])) return null;

            const yearCode = parseInt(yearStr);
            // Calculate level: current year is 2026, so 2026 - (2000 + yearCode) gives the level in hundreds
            let level = (2026 - (2000 + yearCode)) * 100;
            // Clamp to reasonable values
            if (level < 100) level = 100;
            if (level > 600) level = 600;

            return { dept, level, studentNum };
        }

        /**
         * Show error message
         */
        function showError(message) {
            const errorDiv = document.getElementById('regError');
            const errorText = document.getElementById('regErrorText');
            errorText.textContent = message;
            errorDiv.style.display = 'block';
            // Re-trigger animation
            errorDiv.style.animation = 'none';
            errorDiv.offsetHeight; // reflow
            errorDiv.style.animation = 'slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards';
        }

        /**
         * Hide error message
         */
        function hideError() {
            const errorDiv = document.getElementById('regError');
            errorDiv.style.display = 'none';
        }

        /**
         * Highlight input as error
         */
        function markInputError(inputId) {
            const el = document.getElementById(inputId);
            if (el) {
                el.classList.add('input-error');
                el.addEventListener('input', function removeError() {
                    el.classList.remove('input-error');
                    el.removeEventListener('input', removeError);
                }, { once: true });
            }
        }

        /**
         * Handle form submission
         */
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const matricVal = document.getElementById('matric').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsAccepted = document.getElementById('termsInput').checked;
            const submitBtn = document.getElementById('submitBtn');

            // --- Validation ---

            if (!fullName || fullName.length < 2) {
                showError('Please enter your full name.');
                markInputError('fullName');
                return;
            }

            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('Please enter a valid email address.');
                markInputError('email');
                return;
            }

            const parsedMatric = parseKasuMatric(matricVal);
            if (!parsedMatric) {
                showError('Invalid matric number format. Use: KASU/YEAR/DEPT/NUMBER (e.g., KASU/24/BTE/1104)');
                markInputError('matric');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters long.');
                markInputError('password');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match. Please double-check.');
                markInputError('confirmPassword');
                return;
            }

            if (!termsAccepted) {
                showError('You must agree to the Terms of Service and Privacy Policy.');
                document.getElementById('termsCheckbox').style.outline = '2px solid #ef4444';
                document.getElementById('termsCheckbox').style.outlineOffset = '2px';
                setTimeout(() => {
                    document.getElementById('termsCheckbox').style.outline = '';
                    document.getElementById('termsCheckbox').style.outlineOffset = '';
                }, 2000);
                return;
            }

            // --- Simulate account creation ---
            submitBtn.disabled = true;
            document.getElementById('loadingOverlay').style.display = 'flex';

            // Artificial delay for UX
            await new Promise(resolve => setTimeout(resolve, 1800));

            // Build user object
            const user = {
                name: fullName,
                email: email,
                matric: matricVal.toUpperCase(),
                password: password,
                dept: parsedMatric.dept,
                level: parsedMatric.level,
                studentNum: parsedMatric.studentNum,
                registeredAt: new Date().toISOString(),
            };

            // Save to localStorage
            localStorage.setItem('kasuUser', JSON.stringify(user));

            // Redirect to login
            window.location.href = 'login.html';
        });

        /**
         * Live clear error on input focus
         */
        const allInputs = document.querySelectorAll('.input-field');
        allInputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.classList.remove('input-error');
                hideError();
            });
        });

        /**
         * Live matric validation visual feedback
         */
        const matricInput = document.getElementById('matric');
        matricInput.addEventListener('input', function() {
            const val = this.value.trim();
            if (val.length > 0) {
                const parsed = parseKasuMatric(val);
                if (parsed) {
                    this.style.borderColor = '#22c55e';
                    this.style.backgroundColor = '#f9fefb';
                    this.style.boxShadow = '0 0 0 5px rgba(34,197,94,0.06)';
                } else if (val.length >= 10) {
                    this.style.borderColor = '#f59e0b';
                    this.style.backgroundColor = '#fffef9';
                    this.style.boxShadow = '0 0 0 5px rgba(245,158,11,0.06)';
                } else {
                    this.style.borderColor = '#e8ecef';
                    this.style.backgroundColor = '#fafcfc';
                    this.style.boxShadow = '';
                }
            } else {
                this.style.borderColor = '#e8ecef';
                this.style.backgroundColor = '#fafcfc';
                this.style.boxShadow = '';
            }
        });

        // Log initial state
        console.log('%c🔐 KASU Registration Portal Ready %c| %cFormat: KASU/YEAR/DEPT/NUMBER',
            'color: #0d9488; font-weight: bold;',
            '',
            'color: #f59e0b;');
        console.log('%c✨ Designed for Kaduna State University — Past Questions Hub',
            'color: #5c726e; font-style: italic;');
    </script>
</body>
</html>
